services:
  - type: web
    name: plataforma-municipal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./municipal.db
      - key: ORCAMENTO_MENSAL
        value: "1000000"
      - key: LIMITE_PADRAO_SECRETARIA
        value: "200000"
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: ACCESS_TOKEN_EXPIRE_HOURS
        value: "8"
    plan: free
